<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Badam Qysh — производство кирпича М125 | с. Бадам, Туркестанская область</title>
<meta name="description" content="Кирпичный завод Badam Qysh. Полнотелый керамический кирпич марки М125. Отгрузка поддонами, доставка по всему Казахстану.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ ТОКЕНЫ ============ */
:root{
  --ink:#17120C;          /* графит обожжённой печи */
  --ink-2:#221A12;
  --ink-3:#2E2418;
  --orange:#F07A21;       /* из логотипа */
  --orange-d:#C25708;
  --cream:#E9DCC4;        /* цвет самого кирпича */
  --cream-d:#C9B590;
  --sand:#F7F2E8;
  --line:rgba(233,220,196,.16);

  --h:64px;               /* высота шапки */
  --bl:300px;             /* кирпич: длина 250мм */
  --bw:144px;             /* ширина 120мм */
  --bh:78px;              /* высота 65мм */
  --stage:48%;            /* доля колонки под кирпич (десктоп) */
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scroll-snap-type:y mandatory;overflow-x:clip}
body{
  background:var(--ink);color:var(--cream);
  font:400 17px/1.6 "Manrope",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
:focus-visible{outline:2px solid var(--orange);outline-offset:3px;border-radius:2px}

/* ============ ШАПКА ============ */
.hdr{
  position:fixed;inset:0 0 auto 0;height:var(--h);z-index:60;
  display:flex;align-items:center;gap:20px;
  padding:0 clamp(16px,4vw,44px);
  background:rgba(23,18,12,.78);
  backdrop-filter:blur(14px) saturate(1.2);
  border-bottom:1px solid var(--line);
}
.hdr__logo{display:flex;align-items:center;gap:11px;margin-right:auto}
.hdr__logo img{width:38px;height:38px}
.hdr__name{font:700 19px/1 "Oswald",sans-serif;letter-spacing:.12em;color:var(--cream)}
.hdr__name small{display:block;font:500 8.5px/1.4 "Manrope",sans-serif;letter-spacing:.22em;color:var(--cream-d);margin-top:3px}
.nav{display:flex;gap:26px}
.nav a{font:500 12px/1 "Oswald",sans-serif;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-d);transition:color .2s}
.nav a:hover,.nav a[aria-current="true"]{color:var(--orange)}
.hdr__tel{font:600 15px/1 "Oswald",sans-serif;letter-spacing:.04em;white-space:nowrap}
.hdr__cta{
  font:600 12px/1 "Oswald",sans-serif;letter-spacing:.12em;text-transform:uppercase;
  background:var(--orange);color:#1a1109;padding:12px 18px;border-radius:2px;
  transition:background .2s,transform .15s;
}
.hdr__cta:hover{background:#ff8c33;transform:translateY(-1px)}
/* полоса обжига = прогресс скролла */
.kiln{position:absolute;left:0;bottom:-1px;height:2px;width:0;
  background:linear-gradient(90deg,var(--orange-d),var(--orange),#ffb066);}
.burger{display:none;width:42px;height:42px;border:1px solid var(--line);background:none;border-radius:2px;cursor:pointer;position:relative}
.burger i{position:absolute;left:11px;right:11px;height:1.5px;background:var(--cream);transition:.25s}
.burger i:nth-child(1){top:15px}.burger i:nth-child(2){top:20px}.burger i:nth-child(3){top:25px}
.burger[aria-expanded="true"] i:nth-child(1){transform:translateY(5px) rotate(45deg)}
.burger[aria-expanded="true"] i:nth-child(2){opacity:0}
.burger[aria-expanded="true"] i:nth-child(3){transform:translateY(-5px) rotate(-45deg)}

.menu{position:fixed;inset:var(--h) 0 0;z-index:55;background:rgba(20,15,10,.97);
  backdrop-filter:blur(8px);display:none;flex-direction:column;justify-content:center;gap:6px;padding:0 32px}
.menu.open{display:flex}
.menu a{font:600 26px/1.5 "Oswald",sans-serif;letter-spacing:.08em;text-transform:uppercase;
  padding:10px 0;border-bottom:1px solid var(--line)}
.menu .m-tel{margin-top:28px;color:var(--orange);border:0}

/* ============ 3D-КИРПИЧ (фиксированный слой) ============ */
.blayer{position:fixed;inset:0;z-index:4;pointer-events:none;overflow:hidden}
.bstage{position:absolute;top:0;left:0;will-change:transform;
  transform:translate3d(-50%,-50%,0);}
.scene{perspective:1300px;perspective-origin:50% 45%}
.brick{
  position:relative;width:var(--bl);height:var(--bh);
  transform-style:preserve-3d;will-change:transform;
  transform:rotateX(-14deg) rotateY(22deg);
}
.f{position:absolute;left:50%;top:50%;background-size:cover;background-position:center;
  backface-visibility:hidden;box-shadow:inset 0 0 0 1px rgba(90,66,38,.28)}
/* грани: ложок / тычок / постель */
.f.lo{width:var(--bl);height:var(--bh);margin:calc(var(--bh)/-2) 0 0 calc(var(--bl)/-2)}
.f.ty{width:var(--bw);height:var(--bh);margin:calc(var(--bh)/-2) 0 0 calc(var(--bw)/-2)}
.f.po{width:var(--bl);height:var(--bw);margin:calc(var(--bw)/-2) 0 0 calc(var(--bl)/-2)}
.f-front {transform:translateZ(calc(var(--bw)/2));           filter:brightness(1.02)}
.f-back  {transform:rotateY(180deg) translateZ(calc(var(--bw)/2)); filter:brightness(.58)}
.f-right {transform:rotateY(90deg)  translateZ(calc(var(--bl)/2)); filter:brightness(.78)}
.f-left  {transform:rotateY(-90deg) translateZ(calc(var(--bl)/2)); filter:brightness(.68)}
.f-top   {transform:rotateX(90deg)  translateZ(calc(var(--bh)/2)); filter:brightness(1.18)}
.f-bottom{transform:rotateX(-90deg) translateZ(calc(var(--bh)/2)); filter:brightness(.42)}
/* контактная тень */
.bshadow{position:absolute;left:50%;top:50%;width:calc(var(--bl)*1.15);height:calc(var(--bl)*.36);
  transform:translate(-50%,calc(var(--bh)*1.9));border-radius:50%;
  background:radial-gradient(closest-side,rgba(0,0,0,.55),rgba(0,0,0,0) 72%);filter:blur(6px)}

/* ============ СЕКЦИИ ============ */
.sec{
  position:relative;min-height:100svh;min-height:100dvh;
  scroll-snap-align:start;scroll-snap-stop:always;
  display:grid;grid-template-columns:52% var(--stage);
  align-items:center;
  padding:calc(var(--h) + 24px) clamp(16px,4vw,44px) 40px;
  border-bottom:1px solid var(--line);
}
.sec__body{max-width:600px;isolation:isolate;position:relative;z-index:6}
.sec--alt{background:var(--ink-2)}
.sec--sand{background:var(--sand);color:#241A10;border-bottom-color:rgba(36,26,16,.12)}

.eyebrow{display:inline-flex;align-items:center;gap:9px;
  font:600 11px/1 "Oswald",sans-serif;letter-spacing:.24em;text-transform:uppercase;
  color:var(--orange);margin-bottom:22px}
.eyebrow::before{content:"";width:26px;height:1.5px;background:var(--orange)}
h1,h2{font-family:"Oswald",sans-serif;font-weight:600;line-height:1.04;letter-spacing:-.005em;text-transform:uppercase}
h1{font-size:clamp(34px,4.6vw,62px)}
h2{font-size:clamp(28px,3.4vw,46px)}
h2 em{font-style:normal;color:var(--orange)}
.lead{margin-top:20px;font-size:clamp(15px,1.15vw,18px);color:rgba(233,220,196,.72);max-width:52ch}
.sec--sand .lead{color:rgba(36,26,16,.7)}
.note{margin-top:16px;font-size:14px;color:rgba(233,220,196,.5);max-width:52ch}
.sec--sand .note{color:rgba(36,26,16,.55)}

.btns{display:flex;flex-wrap:wrap;gap:12px;margin-top:32px}
.btn{display:inline-flex;align-items:center;gap:10px;padding:16px 26px;border-radius:2px;
  font:600 13px/1 "Oswald",sans-serif;letter-spacing:.14em;text-transform:uppercase;
  border:1.5px solid transparent;transition:.2s;cursor:pointer}
.btn--pri{background:var(--orange);color:#1a1109}
.btn--pri:hover{background:#ff8c33;transform:translateY(-2px)}
.btn--gho{border-color:rgba(233,220,196,.3);color:var(--cream)}
.btn--gho:hover{border-color:var(--orange);color:var(--orange)}
.sec--sand .btn--gho{border-color:rgba(36,26,16,.25);color:#241A10}

/* факты / характеристики */
.facts{display:flex;gap:34px;flex-wrap:wrap;margin-top:38px;padding-top:26px;border-top:1px solid var(--line)}
.sec--sand .facts{border-top-color:rgba(36,26,16,.14)}
.facts b{display:block;font:600 30px/1 "Oswald",sans-serif;color:var(--orange)}
.facts span{display:block;margin-top:6px;font-size:12px;letter-spacing:.06em;color:rgba(233,220,196,.55)}
.sec--sand .facts span{color:rgba(36,26,16,.55)}

.spec{width:100%;margin-top:30px;border-collapse:collapse;font-size:15px}
.spec tr{border-bottom:1px solid var(--line)}
.sec--sand .spec tr{border-bottom-color:rgba(36,26,16,.12)}
.spec td{padding:13px 0}
.spec td:first-child{color:rgba(233,220,196,.6)}
.sec--sand .spec td:first-child{color:rgba(36,26,16,.6)}
.spec td:last-child{text-align:right;font:600 16px/1 "Oswald",sans-serif;letter-spacing:.03em}

/* этапы производства — реальная последовательность, нумерация оправдана */
.steps{margin-top:30px;display:grid;gap:2px}
.step{display:grid;grid-template-columns:52px 1fr;gap:18px;align-items:baseline;
  padding:15px 0;border-bottom:1px solid var(--line)}
.step__n{font:600 13px/1 "Oswald",sans-serif;letter-spacing:.1em;color:var(--orange)}
.step__t{font:600 16px/1.2 "Oswald",sans-serif;letter-spacing:.06em;text-transform:uppercase}
.step__d{grid-column:2;font-size:14px;color:rgba(233,220,196,.55);margin-top:5px}

/* преимущества */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-top:32px;background:var(--line)}
.card{background:var(--ink);padding:22px 20px}
.sec--alt .card{background:var(--ink-2)}
.card h3{font:600 15px/1.25 "Oswald",sans-serif;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.card p{font-size:14px;color:rgba(233,220,196,.55)}

/* доставка */
.zones{margin-top:28px}
.zone{display:flex;justify-content:space-between;align-items:center;gap:16px;
  padding:14px 0;border-bottom:1px solid var(--line)}
.zone__c{font:600 15px/1 "Oswald",sans-serif;letter-spacing:.05em;text-transform:uppercase}
.zone__d{font-size:13px;color:rgba(233,220,196,.5);margin-top:4px}
.zone__p{font:600 15px/1 "Oswald",sans-serif;color:var(--orange);white-space:nowrap}

.sec--end{background:var(--ink-2)}
.sec--end::after{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(90% 70% at 80% 45%,rgba(240,122,33,.10),transparent 62%)}

/* контакты + форма */
.contact{display:grid;gap:26px}
.clist{display:grid;gap:2px}
.crow{display:flex;justify-content:space-between;gap:14px;padding:13px 0;border-bottom:1px solid var(--line);font-size:15px}
.crow span:first-child{color:rgba(233,220,196,.5);font-size:12px;letter-spacing:.12em;text-transform:uppercase;
  font-family:"Oswald",sans-serif;font-weight:500;padding-top:3px}
.crow a{font-weight:600}
.crow a:hover{color:var(--orange)}
.form{display:grid;gap:10px;grid-template-columns:1fr 1fr}
.form input{grid-column:span 1;background:rgba(233,220,196,.05);border:1px solid var(--line);
  padding:15px 14px;color:var(--cream);font:400 15px/1 "Manrope",sans-serif;border-radius:2px}
.form input::placeholder{color:rgba(233,220,196,.35)}
.form input:focus{border-color:var(--orange);outline:none}
.form .btn{grid-column:span 2;justify-content:center}
.form small{grid-column:span 2;font-size:12px;color:rgba(233,220,196,.4)}

.foot{position:absolute;left:clamp(16px,4vw,44px);right:clamp(16px,4vw,44px);bottom:22px;z-index:6;
  display:flex;flex-wrap:wrap;gap:8px 28px;justify-content:space-between;
  padding-top:20px;border-top:1px solid var(--line);
  font-size:12px;letter-spacing:.06em;color:rgba(233,220,196,.4)}

/* ============ HERO ============ */
